name: Manual Deploy to Stage

on:
  workflow_dispatch:
    # Позволяет запускать пайплайн вручную из вкладки Actions
    # В интерфейсе GitHub появится выпадающий список для выбора ветки исходного кода.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy-stage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Тег формируется из хеша коммита выбранной ветки
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: AnNoName1/warhammer40k10thCalc-GitOps
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Update Stage Image and Push
        run: |
          cd gitops-repo
          
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          NEW_IMAGE_LOWER=$(echo "$NEW_IMAGE" | tr '[:upper:]' '[:lower:]')
          
          # Замена пути на актуальный для stage окружения
          TARGET_FILE="cluster-config/apps/web-server/stage/rollout.yaml"
          
          sed -i "s|image: .*|image: $NEW_IMAGE_LOWER|g" $TARGET_FILE
          
          git config user.name "GitHub Actions CD"
          git config user.email "actions@github.com"
          git add $TARGET_FILE
          git commit -m "chore(stage): manual deploy branch ${{ github.ref_name }} - SHA ${{ github.sha }}"
          git push