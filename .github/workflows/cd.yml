name: Build and Update GitOps

on:
  push:
    branches: [ "main" ] # Triggered on push to main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Token is available automatically

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tag will be the short commit SHA
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: AnNoName1/warhammer40k10thCalc-GitOps
          token: ${{ secrets.GITOPS_PAT }} # See "Important" section below
          ref: main

      - name: Update image tag in Rollout
        run: |
          # Find the image: line and replace it with the new version using current SHA
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          NEW_IMAGE_LOWER=$(echo "$NEW_IMAGE" | tr '[:upper:]' '[:lower:]')
          
          sed -i "s|image: .*|image: $NEW_IMAGE_LOWER|g" cluster-config/infra/argo-rollouts/rollout.yaml

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions CI"
          git config user.email "actions@github.com"
          git add cluster-config/infra/argo-rollouts/rollout.yaml
          git commit -m "chore: update web-server image to ${{ github.sha }}"
          git push